<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hifera Company — Carregando…</title>
<link rel="icon" type="image/png" href="public/img/logo/HiferaIcon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Poppins', system-ui, -apple-system, sans-serif;
    background: radial-gradient(ellipse at center, #232323 0%, #1C1C1C 50%, #141414 100%);
    color: #ECECEC;
    overflow: hidden;
    display: grid;
    place-items: center;
    position: relative;
  }

  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(93,224,230,0.07) 1px, transparent 1px),
      linear-gradient(90deg, rgba(93,224,230,0.07) 1px, transparent 1px);
    background-size: 56px 56px;
    mask-image: radial-gradient(ellipse at center, black 35%, transparent 80%);
    -webkit-mask-image: radial-gradient(ellipse at center, black 35%, transparent 80%);
    animation: gridFloat 18s linear infinite;
  }
  @keyframes gridFloat {
    0%   { background-position: 0 0, 0 0; }
    100% { background-position: 56px 56px, 56px 56px; }
  }

  body::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 20% 30%, rgba(93,224,230,0.18), transparent 35%),
      radial-gradient(circle at 80% 70%, rgba(0,74,173,0.28), transparent 45%);
    pointer-events: none;
  }

  .splash {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    z-index: 5;
    text-align: center;
  }

  /* Orbital com a HiferaIcon (H) no centro */
  .splash-logo {
    position: relative;
    width: 340px;
    height: 340px;
    display: grid;
    place-items: center;
    margin-bottom: 32px;
  }
  .splash-logo img {
    width: 300px;
    height: 300px;
    object-fit: contain;
    z-index: 5;
    animation: logoPulse 2.4s ease-in-out infinite;
    filter: drop-shadow(0 0 28px rgba(93,224,230,0.45));
  }
  @keyframes logoPulse {
    0%, 100% { transform: scale(1);    filter: drop-shadow(0 0 24px rgba(93,224,230,0.35)); }
    50%      { transform: scale(1.04); filter: drop-shadow(0 0 40px rgba(93,224,230,0.70)); }
  }

  /* Anéis orbitais */
  .ring {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 1px solid rgba(93,224,230,0.25);
  }
  .ring.r1 { animation: spin 6s linear infinite; }
  .ring.r2 {
    inset: 30px;
    border-color: rgba(0,74,173,0.35);
    border-top-color: transparent;
    border-right-color: transparent;
    animation: spin 4s linear infinite reverse;
  }
  .ring.r3 {
    inset: 60px;
    border-color: rgba(93,224,230,0.20);
    border-bottom-color: transparent;
    animation: spin 8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Pontos orbitando */
  .orbit-dot {
    position: absolute;
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: #5de0e6;
    box-shadow: 0 0 14px #5de0e6, 0 0 28px rgba(93,224,230,0.5);
    top: 50%;
    left: 50%;
    margin-left: -4.5px;
    margin-top: -4.5px;
    animation: orbit 3s linear infinite;
  }
  .orbit-dot.d2 { animation-duration: 4.5s; animation-delay: -1.2s; background: #88a8ff; box-shadow: 0 0 14px #88a8ff, 0 0 28px rgba(136,168,255,0.5); }
  .orbit-dot.d3 { animation-duration: 6s;   animation-delay: -2.4s; background: #5de0e6; }
  @keyframes orbit {
    from { transform: rotate(0deg)   translateX(168px) rotate(0deg); }
    to   { transform: rotate(360deg) translateX(168px) rotate(-360deg); }
  }

  /* Logo principal horizontal (com texto + tagline embutidos) */
  .splash-brand-img {
    max-width: 600px;
    width: 90vw;
    height: auto;
    margin-bottom: 40px;
    opacity: 0;
    animation: brandFade 0.9s ease-out 0.3s forwards;
    filter: drop-shadow(0 0 18px rgba(93,224,230,0.20));
  }
  @keyframes brandFade {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Linha de progresso */
  .progress {
    width: 260px;
    height: 3px;
    background: rgba(255,255,255,0.08);
    border-radius: 999px;
    overflow: hidden;
    position: relative;
  }
  .progress-bar {
    position: absolute;
    top: 0; left: 0; bottom: 0;
    width: 0%;
    background: linear-gradient(90deg, #5de0e6 0%, #004aad 100%);
    border-radius: 999px;
    animation: progress 3s cubic-bezier(0.4, 0.0, 0.2, 1) forwards;
    box-shadow: 0 0 10px rgba(93,224,230,0.6);
  }
  @keyframes progress {
    0%   { width: 0%; }
    20%  { width: 28%; }
    50%  { width: 62%; }
    80%  { width: 88%; }
    100% { width: 100%; }
  }

  .progress-label {
    margin-top: 18px;
    font-size: 11px;
    color: #6a7da3;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 8px;
    justify-content: center;
  }
  .progress-label::before {
    content: '';
    width: 6px;
    height: 6px;
    background: #5de0e6;
    border-radius: 50%;
    box-shadow: 0 0 8px #5de0e6;
    animation: blink 1s ease-in-out infinite;
  }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

  .scan-line {
    position: absolute;
    left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(93,224,230,0.8), transparent);
    top: 0;
    animation: scan 3.2s ease-in-out infinite;
    z-index: 2;
    pointer-events: none;
  }
  @keyframes scan {
    0%, 100% { top: 0%;  opacity: 0; }
    20%      { opacity: 1; }
    80%      { opacity: 1; }
    50%      { top: 100%; }
  }

  .corners { position: fixed; inset: 32px; pointer-events: none; }
  .corner {
    position: absolute;
    width: 28px;
    height: 28px;
    border: 1px solid rgba(93,224,230,0.4);
  }
  .corner.tl { top: 0;    left: 0;    border-right: none; border-bottom: none; }
  .corner.tr { top: 0;    right: 0;   border-left:  none; border-bottom: none; }
  .corner.bl { bottom: 0; left: 0;    border-right: none; border-top:    none; }
  .corner.br { bottom: 0; right: 0;   border-left:  none; border-top:    none; }

  .skip-link {
    position: fixed;
    bottom: 28px;
    right: 32px;
    font-size: 11px;
    letter-spacing: 0.12em;
    color: rgba(180,196,224,0.6);
    text-decoration: none;
    text-transform: uppercase;
    transition: color 0.2s;
    z-index: 10;
  }
  .skip-link:hover { color: #5de0e6; }

  .fade-out { animation: fadeOut 0.4s ease-out forwards; }
  @keyframes fadeOut { to { opacity: 0; transform: scale(1.02); } }

  @media (max-width: 480px) {
    .splash-logo { width: 260px; height: 260px; }
    .splash-logo img { width: 220px; height: 220px; }
    .splash-brand-img { width: 92vw; margin-bottom: 30px; }
    @keyframes orbit {
      from { transform: rotate(0deg)   translateX(128px) rotate(0deg); }
      to   { transform: rotate(360deg) translateX(128px) rotate(-360deg); }
    }
  }
</style>
</head>
<body>

<div class="corners">
  <span class="corner tl"></span>
  <span class="corner tr"></span>
  <span class="corner bl"></span>
  <span class="corner br"></span>
</div>

<div class="scan-line"></div>

<main class="splash" id="splash">
  <div class="splash-logo">
    <span class="ring r1"></span>
    <span class="ring r2"></span>
    <span class="ring r3"></span>
    <span class="orbit-dot d1"></span>
    <span class="orbit-dot d2"></span>
    <span class="orbit-dot d3"></span>
    <img src="public/img/logo/HiferaIcon.png" alt="Hifera Company">
  </div>

  <img class="splash-brand-img" src="public/img/logo/HiferaPrincipalLogo.png" alt="HIFERA COMPANY — Tecnologia que organiza, automatiza e escala">

  <div class="progress"><div class="progress-bar"></div></div>
  <div class="progress-label">Inicializando o hub digital</div>
</main>

<a href="app/views/home.html" class="skip-link">PULAR →</a>

<script>
  (function () {
    var DELAY = 3000;
    var target = 'app/views/home.html';
    setTimeout(function () {
      document.getElementById('splash').classList.add('fade-out');
      setTimeout(function () { window.location.replace(target); }, 380);
    }, DELAY);
  })();
</script>
</body>
</html>
