<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrar — Hifera Company</title>
<meta name="description" content="Acesse sua conta na Hifera Company.">
<link rel="icon" type="image/png" href="../../public/img/logo/HiferaIcon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../public/css/styles.css">
</head>
<body class="auth-page" data-mode="login">

<div class="auth-top">
  <a href="home.html" class="back-link">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    Voltar ao site
  </a>
  <a href="home.html" class="back-link" style="opacity:.85;">
    <img src="../../public/img/logo/HiferaIcon.png" alt="" style="height:32px;width:auto;">
  </a>
</div>

<main class="auth-card">
  <div class="auth-logo">
    <img src="../../public/img/logo/HiferaLogo2.png" alt="Hifera Company" style="height:96px;">
  </div>

  <h1 class="auth-title" id="auth-title">Bem-vindo de volta</h1>
  <p class="auth-sub" id="auth-sub">Acesse seu painel da Hifera Company.</p>

  <div class="auth-tabs" id="auth-tabs" data-mode="login">
    <span class="auth-tab-bg"></span>
    <button class="auth-tab active" data-mode="login"  type="button">Entrar</button>
    <button class="auth-tab"        data-mode="signup" type="button">Criar conta</button>
  </div>

  <div class="auth-msg" id="auth-msg" role="status"></div>

  <form id="auth-form" novalidate>
    <div class="field only-signup">
      <label for="name">Nome completo</label>
      <div class="field-wrap">
        <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <input type="text" id="name" name="name" placeholder="Seu nome" autocomplete="name">
      </div>
    </div>

    <div class="field">
      <label for="email">E-mail</label>
      <div class="field-wrap">
        <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        <input type="email" id="email" name="email" placeholder="voce@empresa.com" autocomplete="email" required>
      </div>
    </div>

    <div class="field">
      <label for="password">Senha</label>
      <div class="field-wrap">
        <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
        <button type="button" class="eye-toggle" aria-label="Mostrar senha">
          <svg class="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          <svg class="eye-shut" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
        </button>
      </div>
    </div>

    <div class="field only-signup">
      <label for="confirm">Confirmar senha</label>
      <div class="field-wrap">
        <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 12l2 2 4-4"/><circle cx="12" cy="12" r="10"/></svg>
        <input type="password" id="confirm" name="confirm" placeholder="Repita a senha" autocomplete="new-password">
        <button type="button" class="eye-toggle" aria-label="Mostrar senha">
          <svg class="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          <svg class="eye-shut" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
        </button>
      </div>
    </div>

    <div class="auth-extra only-login">
      <label class="remember">
        <input type="checkbox" id="remember">
        Lembrar de mim
      </label>
      <a href="#" id="forgot" class="forgot">Esqueci minha senha</a>
    </div>

    <button type="submit" class="auth-submit" id="auth-submit">
      <span class="spinner"></span>
      <span class="label" id="auth-submit-label">Entrar</span>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
    </button>
  </form>

  <div class="auth-divider">ou continue com</div>

  <button type="button" class="auth-google" id="btn-google">
    <svg viewBox="0 0 48 48">
      <path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/>
      <path fill="#FF3D00" d="M6.306 14.691l6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"/>
      <path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238A11.91 11.91 0 0 1 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/>
      <path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303a12.04 12.04 0 0 1-4.087 5.571l.003-.002 6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/>
    </svg>
    Entrar com Google
  </button>

  <p class="auth-footer" id="footer-prompt">
    Não tem conta? <a href="#" data-go="signup">Criar agora</a>
  </p>
</main>

<script src="../../app/models/ApiModel.js"></script>
<script src="../../app/models/AuthModel.js"></script>
<script src="../../app/controllers/LoginController.js"></script>
<script src="../../app/controllers/InteractiveCardsController.js" defer></script>
</body>
</html>
